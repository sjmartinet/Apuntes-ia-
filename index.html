<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Apuntes IA</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --bg:#080C0A; --surface:#0E1411; --surface2:#141A17; --border:#1E2820;
    --green:#2EE87A; --green-dim:#1A7A45; --green-glow:#2EE87A22;
    --red:#FF4D4D; --amber:#F5A623; --text:#E8F0EB; --text-muted:#4A5E52; --text-dim:#8A9E92;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;}
  .screen{position:fixed;inset:0;display:flex;flex-direction:column;transition:opacity .3s,transform .3s;}
  .screen.hidden{opacity:0;pointer-events:none;transform:translateY(20px);}

  /* SETUP */
  #setup{background:var(--bg);align-items:center;justify-content:center;padding:32px 28px;}
  .logo-area{text-align:center;margin-bottom:40px;}
  .logo-icon{font-size:48px;margin-bottom:12px;display:block;filter:drop-shadow(0 0 20px var(--green));}
  .logo-title{font-family:'Playfair Display',serif;font-size:32px;font-weight:900;line-height:1;}
  .logo-title span{color:var(--green);}
  .logo-sub{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);letter-spacing:3px;margin-top:8px;text-transform:uppercase;}
  .setup-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:24px;width:100%;max-width:400px;}
  .setup-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;margin-bottom:8px;}
  .setup-select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;appearance:none;-webkit-appearance:none;cursor:pointer;margin-bottom:16px;}
  .btn-primary{width:100%;padding:18px;background:var(--green);color:#000;font-family:'DM Sans',sans-serif;font-weight:700;font-size:16px;border:none;border-radius:14px;cursor:pointer;transition:all .2s;letter-spacing:.5px;}
  .btn-primary:active{transform:scale(.98);}

  /* RECORD */
  #record{background:var(--bg);padding:0;}
  .rec-header{padding:48px 24px 20px;display:flex;align-items:center;justify-content:space-between;}
  .rec-class-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;}
  .rec-class-name{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;margin-top:2px;}
  .rec-settings-btn{width:38px;height:38px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;}
  .waveform-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 24px;gap:24px;}
  .waveform{display:flex;align-items:center;justify-content:center;gap:3px;height:80px;width:100%;}
  .waveform-bar{width:3px;border-radius:2px;background:var(--border);transition:height .1s;}
  .waveform-bar.active{background:var(--green);box-shadow:0 0 6px var(--green);}
  .timer{font-family:'DM Mono',monospace;font-size:52px;font-weight:300;letter-spacing:-2px;}
  .timer span{color:var(--green);}
  .rec-status{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);max-width:320px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .rec-status.recording{color:var(--red);}
  .rec-status.paused{color:var(--amber);}
  .photos-strip{padding:0 24px;margin-bottom:16px;}
  .photos-strip-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
  .photos-row{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;}
  .photo-thumb{width:60px;height:60px;border-radius:10px;object-fit:cover;border:1px solid var(--border);flex-shrink:0;}
  .photo-add-btn{width:60px;height:60px;border-radius:10px;border:1.5px dashed var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;flex-shrink:0;}
  .controls{padding:0 24px 48px;display:flex;align-items:center;justify-content:center;gap:20px;}
  .ctrl-btn{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;}
  .ctrl-btn-circle{border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .2s;}
  .ctrl-btn-circle:active{transform:scale(.93);}
  .ctrl-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);}
  .btn-rec-main{width:88px;height:88px;background:var(--green);box-shadow:0 0 40px var(--green-glow);}
  .btn-rec-main.recording{background:var(--red);animation:pulseRed 1.2s ease-in-out infinite;}
  .btn-rec-main .inner{font-size:32px;}
  .btn-secondary{width:58px;height:58px;background:var(--surface);border:1px solid var(--border);}
  .btn-secondary .inner{font-size:22px;}
  @keyframes pulseRed{0%,100%{box-shadow:0 0 30px #FF4D4D22}50%{box-shadow:0 0 50px #FF4D4D44}}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:#000b;z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
  .modal-overlay.show{opacity:1;pointer-events:all;}
  .modal-sheet{background:var(--surface);border-radius:24px 24px 0 0;padding:20px 24px 40px;width:100%;max-width:430px;transform:translateY(40px);transition:transform .25s;border-top:1px solid var(--border);}
  .modal-overlay.show .modal-sheet{transform:translateY(0);}
  .modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px;}
  .modal-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;margin-bottom:20px;}
  .modal-option{display:flex;align-items:center;gap:16px;padding:18px;background:var(--surface2);border-radius:14px;cursor:pointer;margin-bottom:10px;border:1px solid var(--border);}
  .modal-option:active{border-color:var(--green-dim);}
  .modal-option-icon{font-size:28px;width:50px;height:50px;background:var(--bg);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .modal-option-title{font-weight:600;font-size:15px;}
  .modal-option-sub{font-size:12px;color:var(--text-muted);margin-top:2px;}

  /* PROCESSING */
  #processing{background:var(--bg);align-items:center;justify-content:center;gap:28px;}
  .proc-animation{display:flex;gap:5px;align-items:flex-end;height:50px;}
  .proc-bar{width:5px;border-radius:3px;background:var(--green);animation:proc 1.2s ease-in-out infinite;}
  .proc-bar:nth-child(1){animation-delay:0s;}
  .proc-bar:nth-child(2){animation-delay:.15s;}
  .proc-bar:nth-child(3){animation-delay:.3s;}
  .proc-bar:nth-child(4){animation-delay:.45s;}
  .proc-bar:nth-child(5){animation-delay:.6s;}
  @keyframes proc{0%,100%{height:8px;opacity:.3}50%{height:50px;opacity:1}}
  .proc-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;text-align:center;}
  .proc-step{font-family:'DM Mono',monospace;font-size:12px;color:var(--green);letter-spacing:2px;text-align:center;padding:0 24px;}

  /* RESULT */
  #result{background:var(--bg);}
  .result-header{padding:48px 24px 16px;display:flex;align-items:center;gap:14px;flex-shrink:0;border-bottom:1px solid var(--border);}
  .back-btn{width:38px;height:38px;border-radius:50%;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;flex-shrink:0;}
  .result-header-info{flex:1;min-width:0;}
  .result-header-class{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;}
  .result-header-title{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
  .pdf-btn{background:var(--green);color:#000;border:none;border-radius:12px;padding:10px 16px;font-weight:700;font-size:13px;cursor:pointer;flex-shrink:0;font-family:'DM Sans',sans-serif;}
  .result-body{flex:1;overflow-y:auto;padding:24px;-webkit-overflow-scrolling:touch;}
  .note-meta{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
  .note-badge{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;padding:5px 10px;border-radius:6px;background:var(--surface);border:1px solid var(--border);color:var(--text-dim);}
  .note-badge.green{border-color:var(--green-dim);color:var(--green);}
  .note-content{line-height:1.8;}
  .note-content h1{font-family:'Playfair Display',serif;font-size:24px;font-weight:900;color:var(--text);margin:0 0 6px;}
  .note-content h2{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--text);margin:24px 0 10px;padding-left:12px;border-left:2px solid var(--green);}
  .note-content h3{font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;color:var(--green);text-transform:uppercase;letter-spacing:1px;margin:18px 0 8px;}
  .note-content p{font-size:15px;color:var(--text-dim);margin-bottom:12px;}
  .note-content ul{padding-left:0;list-style:none;margin-bottom:16px;}
  .note-content ul li{font-size:15px;color:var(--text-dim);padding:6px 0 6px 20px;position:relative;border-bottom:1px solid var(--border);}
  .note-content ul li::before{content:'→';position:absolute;left:0;color:var(--green);font-family:'DM Mono',monospace;font-size:13px;}
  .note-content strong{color:var(--text);font-weight:600;}
  .note-content em{color:var(--amber);font-style:normal;background:var(--surface);padding:1px 6px;border-radius:4px;font-size:13px;font-family:'DM Mono',monospace;}
  .note-content blockquote{border-left:2px solid var(--amber);padding:12px 16px;background:var(--surface);border-radius:0 10px 10px 0;margin:16px 0;font-size:14px;color:var(--text-dim);}
  .note-content hr{border:none;border-top:1px solid var(--border);margin:24px 0;}
  .photo-in-note{border-radius:12px;width:100%;margin:16px 0;border:1px solid var(--border);display:block;}
  .toast{position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 20px;font-size:13px;color:var(--text-dim);font-family:'DM Mono',monospace;z-index:500;transition:transform .3s;white-space:nowrap;}
  .toast.show{transform:translateX(-50%) translateY(0);}
  .toast.error{border-color:#FF4D4D55;color:var(--red);}
  .toast.success{border-color:var(--green-dim);color:var(--green);}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<!-- SETUP -->
<div class="screen" id="setup">
  <div class="logo-area">
    <span class="logo-icon">🎙</span>
    <div class="logo-title">Apuntes<span>IA</span></div>
    <div class="logo-sub">Graba · Organiza · Exporta</div>
  </div>
  <div class="setup-card">
    <div class="setup-label">Selecciona tu materia</div>
    <select class="setup-select" id="classSelect">
      <option value="Matemáticas">📐 Matemáticas</option>
      <option value="Historia">📜 Historia</option>
      <option value="Biología">🧬 Biología</option>
      <option value="Física">⚛️ Física</option>
      <option value="Literatura">📚 Literatura</option>
      <option value="Química">🧪 Química</option>
      <option value="Economía">💹 Economía</option>
      <option value="Filosofía">🔭 Filosofía</option>
    </select>
    <button class="btn-primary" onclick="goToRecord()">Ir a grabar →</button>
  </div>
</div>

<!-- RECORD -->
<div class="screen hidden" id="record">
  <div class="rec-header">
    <div>
      <div class="rec-class-label">Grabando clase</div>
      <div class="rec-class-name" id="recClassName">Matemáticas</div>
    </div>
    <div class="rec-settings-btn" onclick="showScreen('setup')">⚙️</div>
  </div>
  <div class="waveform-area">
    <div class="waveform" id="waveform"></div>
    <div class="timer" id="timer">00<span>:</span>00</div>
    <div class="rec-status" id="recStatus">LISTO PARA GRABAR</div>
  </div>
  <div class="photos-strip" id="photosStrip" style="display:none">
    <div class="photos-strip-label">📷 Fotos añadidas</div>
    <div class="photos-row" id="photosRow">
      <div class="photo-add-btn" onclick="openPhotoModal()">＋</div>
    </div>
  </div>
  <div class="controls">
    <div class="ctrl-btn" id="clearBtn" onclick="clearSession()" style="opacity:.3">
      <div class="ctrl-btn-circle btn-secondary"><span class="inner">🗑</span></div>
      <div class="ctrl-label">Limpiar</div>
    </div>
    <div class="ctrl-btn" onclick="toggleRecord()">
      <div class="ctrl-btn-circle btn-rec-main" id="mainBtn"><span class="inner" id="mainBtnIcon">🎙</span></div>
      <div class="ctrl-label" id="mainBtnLabel">GRABAR</div>
    </div>
    <div class="ctrl-btn" id="photoBtn" onclick="openPhotoModal()" style="opacity:.3">
      <div class="ctrl-btn-circle btn-secondary"><span class="inner">📷</span></div>
      <div class="ctrl-label">Foto</div>
    </div>
  </div>
  <div style="padding:0 24px 0;display:none" id="finishArea">
    <button class="btn-primary" onclick="finishAndProcess()">✨ Generar apunte con IA</button>
    <div style="height:32px"></div>
  </div>
</div>

<!-- PROCESSING -->
<div class="screen hidden" id="processing">
  <div class="proc-animation">
    <div class="proc-bar"></div><div class="proc-bar"></div><div class="proc-bar"></div>
    <div class="proc-bar"></div><div class="proc-bar"></div>
  </div>
  <div class="proc-title">Organizando<br/>tu clase...</div>
  <div class="proc-step" id="procStep">PROCESANDO...</div>
</div>

<!-- RESULT -->
<div class="screen hidden" id="result">
  <div class="result-header">
    <div class="back-btn" onclick="showScreen('record')">‹</div>
    <div class="result-header-info">
      <div class="result-header-class" id="resultClass">CLASE</div>
      <div class="result-header-title" id="resultTitle">Apunte generado</div>
    </div>
    <button class="pdf-btn" onclick="exportPDF()">⬇ PDF</button>
  </div>
  <div class="result-body" id="resultBody"></div>
</div>

<!-- PHOTO MODAL -->
<div class="modal-overlay" id="photoModal" onclick="closePhotoModal()">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title">Agregar imagen</div>
    <div class="modal-option" onclick="capturePhoto()">
      <div class="modal-option-icon">📸</div>
      <div><div class="modal-option-title">Tomar foto</div><div class="modal-option-sub">Abrir cámara</div></div>
    </div>
    <div class="modal-option" onclick="uploadPhoto()">
      <div class="modal-option-icon">🖼️</div>
      <div><div class="modal-option-title">Subir imagen</div><div class="modal-option-sub">Desde galería</div></div>
    </div>
  </div>
</div>
<input type="file" accept="image/*" id="fileInput" style="display:none" onchange="handleFileInput(event)"/>
<input type="file" accept="image/*" capture="environment" id="cameraInput" style="display:none" onchange="handleFileInput(event)"/>

<script>
const API_KEY = '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';

let S = {
  isRecording:false, hasStopped:false, seconds:0,
  timerInterval:null, waveInterval:null,
  mediaRecorder:null, audioChunks:[], audioBlob:null,
  photos:[], className:'Matemáticas',
  liveTranscript:'', speechRec:null, generatedNote:''
};

window.onload = () => {
  const wf = document.getElementById('waveform');
  for(let i=0;i<40;i++){
    const b=document.createElement('div');
    b.className='waveform-bar'; b.style.height='4px'; wf.appendChild(b);
  }
  const saved = localStorage.getItem('apuntes_class');
  if(saved) document.getElementById('classSelect').value = saved;
  goToRecord();
};

function goToRecord(){
  const sel = document.getElementById('classSelect').value;
  S.className = sel;
  localStorage.setItem('apuntes_class', sel);
  document.getElementById('recClassName').textContent = sel;
  showScreen('record');
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

async function toggleRecord(){
  if(!S.isRecording) await startRecording(); else stopRecording();
}

async function startRecording(){
  try{
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    const mime = ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4']
      .find(t=>MediaRecorder.isTypeSupported(t)) || 'audio/webm';
    S.mediaRecorder = new MediaRecorder(stream,{mimeType:mime});
    S.audioChunks=[]; S.liveTranscript='';
    S.mediaRecorder.ondataavailable = e=>{ if(e.data.size>0) S.audioChunks.push(e.data); };
    S.mediaRecorder.onstop = ()=>{
      S.audioBlob = new Blob(S.audioChunks,{type:mime});
      stream.getTracks().forEach(t=>t.stop());
    };
    S.mediaRecorder.start(1000);
    S.isRecording=true; S.hasStopped=false; S.seconds=0;

    // Web Speech API para transcripción en vivo
    const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
    if(SR){
      S.speechRec = new SR();
      S.speechRec.lang='es-ES'; S.speechRec.continuous=true; S.speechRec.interimResults=true;
      let final='';
      S.speechRec.onresult = e=>{
        let interim='';
        for(let i=e.resultIndex;i<e.results.length;i++){
          if(e.results[i].isFinal) final+=e.results[i][0].transcript+' ';
          else interim=e.results[i][0].transcript;
        }
        S.liveTranscript=final+interim;
        const el=document.getElementById('recStatus');
        if(el && S.liveTranscript.length>0)
          el.textContent='● '+(S.liveTranscript.slice(-55))+'...';
      };
      S.speechRec.onerror=()=>{};
      S.speechRec.onend=()=>{ if(S.isRecording) try{S.speechRec.start();}catch(e){} };
      S.speechRec.start();
    }

    document.getElementById('mainBtn').classList.add('recording');
    document.getElementById('mainBtnIcon').textContent='⏹';
    document.getElementById('mainBtnLabel').textContent='DETENER';
    document.getElementById('recStatus').className='rec-status recording';
    document.getElementById('recStatus').textContent='● GRABANDO';
    document.getElementById('photoBtn').style.opacity='1';
    document.getElementById('clearBtn').style.opacity='1';
    document.getElementById('photosStrip').style.display='block';
    document.getElementById('finishArea').style.display='none';

    S.timerInterval=setInterval(()=>{
      S.seconds++;
      const m=String(Math.floor(S.seconds/60)).padStart(2,'0');
      const s=String(S.seconds%60).padStart(2,'0');
      document.getElementById('timer').innerHTML=`${m}<span>:</span>${s}`;
    },1000);

    S.waveInterval=setInterval(()=>{
      document.querySelectorAll('.waveform-bar').forEach(b=>{
        b.style.height=(Math.random()*60+4)+'px';
        b.classList.add('active');
      });
    },80);

  }catch(err){ showToast('No se pudo acceder al micrófono','error'); }
}

function stopRecording(){
  if(S.mediaRecorder && S.mediaRecorder.state!=='inactive') S.mediaRecorder.stop();
  S.isRecording=false; S.hasStopped=true;
  clearInterval(S.timerInterval); clearInterval(S.waveInterval);
  if(S.speechRec){ try{S.speechRec.onend=null;S.speechRec.stop();}catch(e){} }
  document.getElementById('mainBtn').classList.remove('recording');
  document.getElementById('mainBtnIcon').textContent='🎙';
  document.getElementById('mainBtnLabel').textContent='GRABAR MÁS';
  document.getElementById('recStatus').className='rec-status paused';
  document.getElementById('recStatus').textContent='⏸ PAUSADO';
  document.querySelectorAll('.waveform-bar').forEach(b=>{b.style.height='4px';b.classList.remove('active');});
  document.getElementById('finishArea').style.display='block';
}

function clearSession(){
  if(S.isRecording) stopRecording();
  S.audioBlob=null; S.liveTranscript=''; S.audioChunks=[]; S.photos=[]; S.seconds=0; S.hasStopped=false;
  document.getElementById('timer').innerHTML='00<span>:</span>00';
  document.getElementById('recStatus').className='rec-status';
  document.getElementById('recStatus').textContent='LISTO PARA GRABAR';
  document.getElementById('mainBtnIcon').textContent='🎙';
  document.getElementById('mainBtnLabel').textContent='GRABAR';
  document.getElementById('mainBtn').classList.remove('recording');
  document.getElementById('photoBtn').style.opacity='0.3';
  document.getElementById('clearBtn').style.opacity='0.3';
  document.getElementById('photosStrip').style.display='none';
  document.getElementById('finishArea').style.display='none';
  document.getElementById('photosRow').innerHTML='<div class="photo-add-btn" onclick="openPhotoModal()">＋</div>';
}

function openPhotoModal(){ document.getElementById('photoModal').classList.add('show'); }
function closePhotoModal(){ document.getElementById('photoModal').classList.remove('show'); }
function capturePhoto(){ closePhotoModal(); document.getElementById('cameraInput').click(); }
function uploadPhoto(){ closePhotoModal(); document.getElementById('fileInput').click(); }
function handleFileInput(event){
  const file=event.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const dataUrl=e.target.result;
    S.photos.push({dataUrl, base64:dataUrl.split(',')[1], mimeType:file.type||'image/jpeg'});
    const row=document.getElementById('photosRow');
    const img=document.createElement('img');
    img.src=dataUrl; img.className='photo-thumb';
    row.insertBefore(img, row.querySelector('.photo-add-btn'));
    showToast(`Foto ${S.photos.length} añadida`,'success');
  };
  reader.readAsDataURL(file);
  event.target.value='';
}

async function callClaude(messages, maxTokens=2000){
  const res = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key': API_KEY,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body: JSON.stringify({model:'claude-sonnet-4-20250514', max_tokens:maxTokens, messages})
  });
  if(!res.ok){
    const err=await res.json().catch(()=>({}));
    throw new Error(err?.error?.message || `Error ${res.status}`);
  }
  const data=await res.json();
  return data.content[0].text;
}

async function finishAndProcess(){
  if(!S.liveTranscript && S.photos.length===0){
    showToast('Nada que procesar — graba algo primero','error'); return;
  }
  showScreen('processing');
  try{
    // Leer fotos con Claude Vision
    let photoTexts=[];
    if(S.photos.length>0){
      document.getElementById('procStep').textContent='LEYENDO FOTOS DEL PIZARRÓN...';
      for(let i=0;i<S.photos.length;i++){
        const p=S.photos[i];
        const text = await callClaude([{
          role:'user',
          content:[
            {type:'image', source:{type:'base64', media_type:p.mimeType, data:p.base64}},
            {type:'text', text:'Extrae y transcribe todo el contenido visible: texto, fórmulas, diagramas. Solo devuelve el contenido extraído.'}
          ]
        }], 800);
        photoTexts.push(`[Foto ${i+1}]: ${text}`);
      }
    }

    // Organizar con Claude
    document.getElementById('procStep').textContent='ORGANIZANDO CON IA...';
    let input='';
    if(S.liveTranscript) input+=`TRANSCRIPCIÓN DE LA CLASE:\n${S.liveTranscript}\n\n`;
    if(photoTexts.length>0) input+=`CONTENIDO DEL PIZARRÓN:\n${photoTexts.join('\n')}\n\n`;

    const html = await callClaude([{
      role:'user',
      content:`Eres un experto en crear apuntes universitarios. Analiza este material de "${S.className}" y genera un apunte estructurado en HTML.

${input}

Usa estas etiquetas EXACTAS:
- <h1> título principal
- <h2> cada sección/subtema
- <h3> tipo: DEFINICIÓN, EJEMPLO, FÓRMULA
- <p> explicaciones
- <ul><li> puntos clave
- <strong> conceptos importantes
- <em> términos técnicos
- <blockquote> notas importantes
- Al final: <h2>Resumen</h2> con los 5 puntos más importantes

Responde SOLO con el HTML interno, sin etiquetas html/head/body ni backticks.`
    }], 2500);

    S.generatedNote=html;
    renderResult(html);
    showScreen('result');

  }catch(err){
    showScreen('record');
    showToast(err.message || 'Error al procesar','error');
  }
}

function renderResult(html){
  const date=new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});
  document.getElementById('resultClass').textContent=S.className.toUpperCase();
  const tmp=document.createElement('div'); tmp.innerHTML=html;
  const h1=tmp.querySelector('h1');
  document.getElementById('resultTitle').textContent=h1?h1.textContent:'Apunte generado';

  let finalHtml=html;
  if(S.photos.length>0){
    const photoHtml=S.photos.map((p,i)=>
      `<h3>📷 FOTO ${i+1} — PIZARRÓN</h3><img src="${p.dataUrl}" class="photo-in-note"/>`
    ).join('');
    const lastH2=finalHtml.lastIndexOf('<h2>');
    finalHtml = lastH2>0
      ? finalHtml.slice(0,lastH2)+photoHtml+finalHtml.slice(lastH2)
      : finalHtml+photoHtml;
  }

  const meta=`<div class="note-meta">
    <span class="note-badge green">✅ ${S.className}</span>
    <span class="note-badge">📅 ${date}</span>
    ${S.seconds>0?`<span class="note-badge">🎙 ${Math.floor(S.seconds/60)}m ${S.seconds%60}s</span>`:''}
    ${S.photos.length>0?`<span class="note-badge">📷 ${S.photos.length} foto(s)</span>`:''}
  </div>`;

  document.getElementById('resultBody').innerHTML=meta+`<div class="note-content">${finalHtml}</div>`;
}

async function exportPDF(){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const date=new Date().toLocaleDateString('es-ES',{day:'numeric',month:'long',year:'numeric'});
  const pageW=210,margin=20,contentW=170;
  let y=25;
  const addPage=()=>{doc.addPage();y=20;};
  const chk=(n=10)=>{if(y+n>280)addPage();};

  doc.setFillColor(46,232,122);
  doc.rect(0,0,pageW,14,'F');
  doc.setTextColor(0,0,0);
  doc.setFontSize(8);
  doc.setFont('helvetica','bold');
  doc.text(`ApuntesIA · ${S.className} · ${date}`,margin,9);
  y=28;

  const div=document.createElement('div');
  div.innerHTML=S.generatedNote;
  const walk=node=>{
    if(node.nodeType===3) return;
    const tag=node.tagName?.toLowerCase();
    if(tag==='h1'){
      chk(18); doc.setFontSize(20); doc.setFont('helvetica','bold'); doc.setTextColor(20,20,20);
      const lines=doc.splitTextToSize(node.textContent,contentW);
      doc.text(lines,margin,y); y+=lines.length*8+4;
      doc.setDrawColor(46,232,122); doc.setLineWidth(0.8);
      doc.line(margin,y-2,margin+contentW*0.5,y-2); y+=6;
    } else if(tag==='h2'){
      chk(14); y+=4;
      doc.setFillColor(20,26,23);
      doc.roundedRect(margin-4,y-5,contentW+8,10,2,2,'F');
      doc.setFontSize(13); doc.setFont('helvetica','bold'); doc.setTextColor(46,232,122);
      doc.text(node.textContent,margin,y+1); y+=10;
    } else if(tag==='h3'){
      chk(10); doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(245,166,35);
      doc.text(node.textContent.toUpperCase(),margin,y); y+=7;
    } else if(tag==='p'){
      chk(8); doc.setFontSize(11); doc.setFont('helvetica','normal'); doc.setTextColor(60,70,65);
      const lines=doc.splitTextToSize(node.textContent,contentW);
      doc.text(lines,margin,y); y+=lines.length*6+3;
    } else if(tag==='li'){
      chk(8); doc.setFillColor(46,232,122); doc.circle(margin+1.5,y-1.5,1.2,'F');
      doc.setFontSize(11); doc.setFont('helvetica','normal'); doc.setTextColor(60,70,65);
      const lines=doc.splitTextToSize(node.textContent,contentW-8);
      doc.text(lines,margin+6,y); y+=lines.length*6+2;
    } else if(tag==='blockquote'){
      chk(10); doc.setDrawColor(245,166,35); doc.setLineWidth(1.5);
      doc.line(margin,y-2,margin,y+10);
      doc.setFontSize(10); doc.setFont('helvetica','italic'); doc.setTextColor(100,90,70);
      const lines=doc.splitTextToSize(node.textContent,contentW-8);
      doc.text(lines,margin+6,y); y+=lines.length*6+6;
    } else if(tag==='hr'){
      chk(8); doc.setDrawColor(30,40,32); doc.setLineWidth(0.3);
      doc.line(margin,y,margin+contentW,y); y+=6;
    } else if(tag==='img'){
      chk(8); doc.setFontSize(9); doc.setFont('helvetica','italic'); doc.setTextColor(100,130,110);
      doc.text('[Foto del pizarrón]',margin,y); y+=8;
    } else {
      for(const child of node.childNodes) walk(child); return;
    }
  };
  for(const child of div.childNodes) walk(child);

  const total=doc.getNumberOfPages();
  for(let i=1;i<=total;i++){
    doc.setPage(i); doc.setFontSize(8); doc.setTextColor(150);
    doc.text(`ApuntesIA · ${S.className} · Pág ${i}/${total}`,pageW/2,290,{align:'center'});
  }
  doc.save(`${S.className.replace(/[^a-zA-Z0-9]/g,'_')}_${new Date().toISOString().slice(0,10)}.pdf`);
  showToast('PDF descargado ✓','success');
}

function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`toast ${type} show`;
  setTimeout(()=>t.classList.remove('show'),3500);
}
